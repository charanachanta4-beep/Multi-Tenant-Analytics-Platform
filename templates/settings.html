<!DOCTYPE html>

<html>

<head>

  <meta charset="UTF-8">

  <title>Settings</title>

  <link rel="stylesheet" href="{{url_for('static',filename='css/settings.css')}}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>


  <div class="container">
    <div class="top-header">

      <a href="/dashboard" class="back-btn">

        <i class="bi bi-arrow-left"></i>

        Dashboard

      </a>



    </div>

    <h1>

      ⚙ Settings

    </h1>

    <div class="settings-grid">

      <div class="card">

        <h3>

          Workspace

        </h3>

        <label>

          Company

        </label>

        <input value="{{tenant.company}}" readonly>

        <label>

          Email

        </label>

        <input value="{{tenant.email}}" readonly>

      </div>

      <div class="card">

        <h3>

          Security

        </h3>

        <button>

          Change Password

        </button>

        <button>

          Regenerate API Key

        </button>

      </div>

      <div class="card">

        <h3>

          Appearance

        </h3>

        <label>

          Theme

        </label>

        <select>

          <option>

            Brutalist Light

          </option>

          <option disabled>

            Dark (Coming Soon)

          </option>

        </select>

      </div>

      <div class="card">

        <h3>

          Danger Zone

        </h3>

        <button class="danger">

          Delete Workspace

        </button>

      </div>

    </div>

  </div>

</body>

</html>
